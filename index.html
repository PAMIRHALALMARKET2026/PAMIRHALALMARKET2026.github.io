<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAMIR HALAL MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">

    <div class="max-w-6xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold text-center mb-10">PAMIR HALAL MARKET</h1>

        <!-- Admin Login -->
        <div class="mb-12 text-center">
            <input type="password" id="admin-pass" placeholder="Admin Password" class="border p-4 rounded w-64">
            <button onclick="loginAdmin()" class="bg-emerald-600 text-white px-8 py-4 rounded ml-4">Login Admin</button>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" class="hidden mb-12 p-8 border rounded-3xl bg-white">
            <h2 class="text-2xl font-bold mb-4">Add New Product</h2>
            <input id="prod-name" placeholder="Product Name" class="border p-3 w-full mb-2">
            <input id="prod-price-kg" placeholder="Price per kg (€)" type="number" step="0.01" class="border p-3 w-full mb-2">
            <input id="prod-price-gram" placeholder="Price per gram (€)" type="number" step="0.0001" class="border p-3 w-full mb-2">
            <button onclick="addProduct()" class="bg-green-600 text-white px-8 py-4 rounded">Add Product</button>
        </div>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search products..." class="w-full border p-4 rounded mb-8">

        <!-- Products -->
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kepilggbkqmwpimizilq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlcGlsZ2dia3Ftd3BpbWl6aWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzgxMzcsImV4cCI6MjA5OTAxNDEzN30.wSjewR-bboD8lVXzm0GhziNNowcynJF0_syH0l6L590';

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts(search = '') {
            let q = supabase.from('products').select('*');
            if (search) q = q.ilike('name', `%${search}%`);
            
            const { data } = await q;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            data.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow";
                div.innerHTML = `
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-emerald-600 text-2xl">${p.price_kg} € / kg</p>
                    <p class="text-gray-500">${p.price_gram} € / gram</p>
                `;
                grid.appendChild(div);
            });
        }

        async function addProduct() {
            const name = document.getElementById('prod-name').value;
            const priceKg = parseFloat(document.getElementById('prod-price-kg').value);
            const priceGram = parseFloat(document.getElementById('prod-price-gram').value);

            if (name && priceKg) {
                await supabase.from('products').insert({ name, price_kg: priceKg, price_gram: priceGram });
                loadProducts();
                alert("Product added successfully!");
            }
        }

        function loginAdmin() {
            if (document.getElementById('admin-pass').value === "admin123") {
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                alert("Wrong password");
            }
        }

        document.getElementById('search').addEventListener('input', (e) => loadProducts(e.target.value));

        loadProducts();
    </script>
</body>
</html>
