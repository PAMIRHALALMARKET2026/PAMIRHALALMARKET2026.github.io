<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pamir Halal Market Kerava">
    <title>PAMIR HALAL MARKET | Halal Market Kerava</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .nav-link { transition: all 0.3s; }
        .nav-link:hover { color: #10b981; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-emerald-700 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-store text-4xl"></i>
                <h1 class="text-3xl font-bold">PAMIR HALAL MARKET</h1>
            </div>
            <div class="hidden md:flex gap-8 text-lg">
                <a href="#home" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#products" class="nav-link">Products</a>
                <a href="#reviews" class="nav-link">Reviews</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Products -->
    <section id="products" class="py-20 bg-gray-100">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">Our Products</h2>
            <input type="text" id="search" placeholder="Search products..." class="w-full max-w-md mx-auto block border p-4 rounded-full mb-10">
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- Google Reviews -->
    <section id="reviews" class="py-20 bg-white">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">Customer Reviews</h2>
            <script src="https://elfsightcdn.com/platform.js" async></script>
            <div class="elfsight-app-103f9793-aa49-4d7b-bed2-99c97c0e0a22" data-elfsight-app-lazy></div>
        </div>
    </section>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Add New Product</h2>
            <input id="prod-name" placeholder="Product Name" class="border p-3 w-full mb-2">
            <input id="prod-price-kg" placeholder="Price per kg (€)" type="number" step="0.01" class="border p-3 w-full mb-2">
            <input id="prod-price-gram" placeholder="Price per gram (€)" type="number" step="0.0001" class="border p-3 w-full mb-2">
            <input id="prod-description" placeholder="Description" class="border p-3 w-full mb-2">
            <input id="prod-image" placeholder="Image URL (optional)" class="border p-3 w-full mb-6">
            <button onclick="addProduct()" class="bg-green-600 text-white px-8 py-4 w-full rounded">Add Product</button>
            <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="mt-4 text-gray-500 w-full">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kepilggbkqmwpimizilq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlcGlsZ2dia3Ftd3BpbWl6aWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzgxMzcsImV4cCI6MjA5OTAxNDEzN30.wSjewR-bboD8lVXzm0GhziNNowcynJF0_syH0l6L590';

        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts(search = '') {
            let q = supabase.from('products').select('*');
            if (search) q = q.ilike('name', `%${search}%`);
            const { data } = await q;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow hover:shadow-xl";
                div.innerHTML = `
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-emerald-600 text-2xl">${p.price_kg} € / kg</p>
                    <p class="text-gray-500">${p.price_gram} € / gram</p>
                `;
                grid.appendChild(div);
            });
        }

        async function addProduct() {
            const name = document.getElementById('prod-name').value;
            const priceKg = parseFloat(document.getElementById('prod-price-kg').value);
            const priceGram = parseFloat(document.getElementById('prod-price-gram').value);
            if (name && priceKg) {
                await supabase.from('products').insert({ name, price_kg: priceKg, price_gram: priceGram });
                loadProducts();
                alert("Product added!");
            }
        }

        // Open Admin Panel when #admin is in URL
        if (window.location.hash === '#admin') {
            const pass = prompt("Enter Admin Password:");
            if (pass === "admin123") {
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                alert("Wrong password");
            }
        }

        document.getElementById('search').addEventListener('input', (e) => loadProducts(e.target.value));
        loadProducts();
    </script>
</body>
</html>
